<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Textpot — Architecture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f9fa;
      padding: 40px 20px;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 40px;
    }
    svg {
      display: block;
      margin: 0 auto;
      max-width: 100%;
    }
    .legend {
      max-width: 720px;
      margin: 32px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #444;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>Textpot Architecture</h1>
  <p class="subtitle">Multilingual AI Research Agent — Gemini Computer Use + Cloud Run</p>

  <svg width="900" height="680" viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#6b7280" />
      </marker>
      <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#3b82f6" />
      </marker>
      <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#10b981" />
      </marker>
      <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6" />
      </marker>
      <filter id="shadow">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018" />
      </filter>
    </defs>

    <!-- ── USER BROWSER ─────────────────────────────────────────────── -->
    <rect x="330" y="20" width="240" height="70" rx="12" fill="#fff" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)" />
    <text x="450" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#111">🖥️ User Browser</text>
    <text x="450" y="66" text-anchor="middle" font-size="11" fill="#6b7280">Next.js frontend on Vercel</text>

    <!-- WebSocket arrow down -->
    <line x1="450" y1="90" x2="450" y2="158" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrow-blue)" stroke-dasharray="5,3" />
    <text x="460" y="128" font-size="10" fill="#3b82f6">WebSocket (query + sources)</text>

    <!-- WebSocket arrow up (screenshots + results) -->
    <line x1="430" y1="160" x2="430" y2="92" stroke="#10b981" stroke-width="1.8" marker-end="url(#arrow-green)" stroke-dasharray="5,3" />
    <text x="244" y="120" font-size="10" fill="#10b981">screenshots, results, synthesis</text>

    <!-- ── FASTAPI BACKEND ──────────────────────────────────────────── -->
    <rect x="270" y="160" width="360" height="80" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)" />
    <text x="450" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8">⚡ FastAPI Backend</text>
    <text x="450" y="211" text-anchor="middle" font-size="11" fill="#3b82f6">Google Cloud Run  ·  /ws endpoint</text>
    <text x="450" y="228" text-anchor="middle" font-size="10" fill="#6b7280">Stateless · CORS open · min-instances=1 · 2Gi RAM</text>

    <!-- asyncio.gather label -->
    <text x="450" y="262" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">asyncio.gather — all sources run in parallel</text>

    <!-- ── 4 AGENT LANES ────────────────────────────────────────────── -->
    <!-- Naver -->
    <rect x="30" y="290" width="180" height="160" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)" />
    <rect x="30" y="290" width="180" height="30" rx="10" fill="#fef2f2" />
    <rect x="30" y="310" width="180" height="10" rx="0" fill="#fef2f2" />
    <text x="120" y="311" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">🇰🇷 Naver Agent</text>
    <text x="120" y="336" text-anchor="middle" font-size="10" fill="#555">Playwright Chromium</text>
    <text x="120" y="352" text-anchor="middle" font-size="10" fill="#555">1280×800 viewport</text>
    <text x="120" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Gemini Computer Use</text>
    <text x="120" y="391" text-anchor="middle" font-size="9" fill="#8b5cf6">gemini-2.5-flash-preview</text>
    <text x="120" y="410" text-anchor="middle" font-size="9" fill="#6b7280">screenshot → action → repeat</text>
    <text x="120" y="427" text-anchor="middle" font-size="9" fill="#6b7280">max 15 iterations</text>

    <!-- Yahoo Japan -->
    <rect x="240" y="290" width="180" height="160" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)" />
    <rect x="240" y="290" width="180" height="30" rx="10" fill="#fff7ed" />
    <rect x="240" y="310" width="180" height="10" rx="0" fill="#fff7ed" />
    <text x="330" y="311" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">🇯🇵 Yahoo Japan Agent</text>
    <text x="330" y="336" text-anchor="middle" font-size="10" fill="#555">Playwright Chromium</text>
    <text x="330" y="352" text-anchor="middle" font-size="10" fill="#555">1280×800 viewport</text>
    <text x="330" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Gemini Computer Use</text>
    <text x="330" y="391" text-anchor="middle" font-size="9" fill="#8b5cf6">gemini-2.5-flash-preview</text>
    <text x="330" y="410" text-anchor="middle" font-size="9" fill="#6b7280">screenshot → action → repeat</text>
    <text x="330" y="427" text-anchor="middle" font-size="9" fill="#6b7280">max 15 iterations</text>

    <!-- Baidu -->
    <rect x="450" y="290" width="180" height="160" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)" />
    <rect x="450" y="290" width="180" height="30" rx="10" fill="#f0fdf4" />
    <rect x="450" y="310" width="180" height="10" rx="0" fill="#f0fdf4" />
    <text x="540" y="311" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">🇨🇳 Baidu Agent</text>
    <text x="540" y="336" text-anchor="middle" font-size="10" fill="#555">Playwright Chromium</text>
    <text x="540" y="352" text-anchor="middle" font-size="10" fill="#555">1280×800 viewport</text>
    <text x="540" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Gemini Computer Use</text>
    <text x="540" y="391" text-anchor="middle" font-size="9" fill="#8b5cf6">gemini-2.5-flash-preview</text>
    <text x="540" y="410" text-anchor="middle" font-size="9" fill="#6b7280">screenshot → action → repeat</text>
    <text x="540" y="427" text-anchor="middle" font-size="9" fill="#6b7280">max 15 iterations</text>

    <!-- Weibo -->
    <rect x="660" y="290" width="180" height="160" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)" />
    <rect x="660" y="290" width="180" height="30" rx="10" fill="#fdf4ff" />
    <rect x="660" y="310" width="180" height="10" rx="0" fill="#fdf4ff" />
    <text x="750" y="311" text-anchor="middle" font-size="12" font-weight="600" fill="#6b21a8">🇨🇳 Weibo Agent</text>
    <text x="750" y="336" text-anchor="middle" font-size="10" fill="#555">Playwright Chromium</text>
    <text x="750" y="352" text-anchor="middle" font-size="10" fill="#555">1280×800 viewport</text>
    <text x="750" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">Gemini Computer Use</text>
    <text x="750" y="391" text-anchor="middle" font-size="9" fill="#8b5cf6">gemini-2.5-flash-preview</text>
    <text x="750" y="410" text-anchor="middle" font-size="9" fill="#6b7280">screenshot → action → repeat</text>
    <text x="750" y="427" text-anchor="middle" font-size="9" fill="#6b7280">max 15 iterations</text>

    <!-- Connectors: backend → agents -->
    <line x1="330" y1="240" x2="120" y2="290" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)" />
    <line x1="390" y1="240" x2="330" y2="290" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)" />
    <line x1="510" y1="240" x2="540" y2="290" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)" />
    <line x1="570" y1="240" x2="750" y2="290" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Target site bubbles -->
    <rect x="50" y="472" width="140" height="28" rx="14" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />
    <text x="120" y="491" text-anchor="middle" font-size="11" fill="#991b1b">naver.com</text>

    <rect x="256" y="472" width="148" height="28" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="1" />
    <text x="330" y="491" text-anchor="middle" font-size="11" fill="#9a3412">yahoo.co.jp</text>

    <rect x="466" y="472" width="148" height="28" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
    <text x="540" y="491" text-anchor="middle" font-size="11" fill="#166534">baidu.com</text>

    <rect x="676" y="472" width="148" height="28" rx="14" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1" />
    <text x="750" y="491" text-anchor="middle" font-size="11" fill="#6b21a8">s.weibo.com</text>

    <!-- Agent → site arrows -->
    <line x1="120" y1="450" x2="120" y2="472" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)" />
    <line x1="330" y1="450" x2="330" y2="472" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)" />
    <line x1="540" y1="450" x2="540" y2="472" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)" />
    <line x1="750" y1="450" x2="750" y2="472" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- ── SYNTHESIS ─────────────────────────────────────────────────── -->
    <rect x="270" y="530" width="360" height="60" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)" />
    <text x="450" y="558" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">🧠 Synthesis</text>
    <text x="450" y="576" text-anchor="middle" font-size="11" fill="#7c3aed">gemini-2.0-flash  ·  journalistic summary</text>

    <!-- Agents → synthesis arrows -->
    <line x1="200" y1="450" x2="340" y2="530" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-purple)" />
    <line x1="420" y1="450" x2="420" y2="530" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-purple)" />
    <line x1="620" y1="450" x2="560" y2="530" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-purple)" />

    <!-- Synthesis → backend (to send to frontend) -->
    <line x1="450" y1="530" x2="450" y2="242" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-purple)" />

    <!-- ── CHAT FLOW NOTE ─────────────────────────────────────────────── -->
    <rect x="660" y="160" width="210" height="80" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1.2" />
    <text x="765" y="183" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">💬 Chat Flow</text>
    <text x="765" y="200" text-anchor="middle" font-size="10" fill="#6b7280">frontend → /ws (chat msg</text>
    <text x="765" y="215" text-anchor="middle" font-size="10" fill="#6b7280">+ results + history)</text>
    <text x="765" y="230" text-anchor="middle" font-size="10" fill="#7c3aed">gemini-2.0-flash → response</text>

    <!-- chat box connector to backend -->
    <line x1="660" y1="200" x2="630" y2="200" stroke="#9ca3af" stroke-width="1.2" marker-end="url(#arrow)" />

    <!-- Title box bottom label -->
    <text x="450" y="655" text-anchor="middle" font-size="11" fill="#9ca3af">Textpot · Gemini Computer Use · Cloud Run · asyncio.gather</text>
  </svg>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#3b82f6;"></div>
      <span>WebSocket (query / results)</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#10b981;"></div>
      <span>Streaming screenshots &amp; results</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#8b5cf6;"></div>
      <span>Gemini API calls</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#6b7280;"></div>
      <span>Internal orchestration</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#9ca3af;"></div>
      <span>Browser navigation</span>
    </div>
  </div>
</body>
</html>
