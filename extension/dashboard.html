<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Textpot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #17181c;
      --border: #2a2b30;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #f97316;
      --accent-hover: #ea6c00;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --radius: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    /* Layout */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .tagline { font-size: 12px; color: var(--muted); }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Search bar */
    .search-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .search-row input {
      flex: 1;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--muted); }
    .btn-search {
      padding: 11px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-search:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Source pills */
    .source-pills { display: flex; flex-direction: column; gap: 8px; }
    .pill-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .pill-group-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      width: 80px;
      flex-shrink: 0;
    }
    .pill {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .pill .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pill.loading .status-dot { opacity: 1; background: var(--yellow); animation: pulse 1s infinite; }
    .pill.done .status-dot { opacity: 1; background: var(--green); }
    .pill.error .status-dot { opacity: 1; background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Results grid */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .source-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .source-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .source-flag { font-size: 18px; display: flex; align-items: center; }
    .source-flag img { width: 22px; height: 22px; object-fit: contain; border-radius: 4px; }
    .pill img { width: 15px; height: 15px; object-fit: contain; border-radius: 2px; vertical-align: middle; }
    .source-card-name { font-weight: 600; font-size: 14px; }
    .source-lang { font-size: 11px; color: var(--muted); }

    .sentiment-bar {
      display: flex;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
      gap: 1px;
    }
    .sentiment-bar .pos { background: var(--green); }
    .sentiment-bar .neu { background: var(--muted); }
    .sentiment-bar .neg { background: var(--red); }

    .result-items { display: flex; flex-direction: column; gap: 10px; }
    .result-item {
      padding: 10px;
      background: var(--bg);
      border-radius: 7px;
      border: 1px solid var(--border);
    }
    .result-item a {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      display: block;
      margin-bottom: 4px;
      line-height: 1.35;
    }
    .result-item a:hover { color: var(--accent); }
    .result-item .summary {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .result-item .sentiment-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .sentiment-badge.positive { background: rgba(34,197,94,0.15); color: var(--green); }
    .sentiment-badge.neutral  { background: rgba(100,116,139,0.15); color: var(--muted); }
    .sentiment-badge.negative { background: rgba(239,68,68,0.15); color: var(--red); }

    .quotes-list { margin-top: 10px; }
    .quote-item {
      font-size: 12px;
      font-style: italic;
      color: var(--muted);
      padding: 6px 10px;
      border-left: 2px solid var(--border);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .skeleton {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .skeleton-line {
      height: 12px;
      background: var(--border);
      border-radius: 4px;
      animation: shimmer 1.4s infinite;
    }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.medium { width: 80%; }

    @keyframes shimmer {
      0%   { opacity: 1; }
      50%  { opacity: 0.4; }
      100% { opacity: 1; }
    }

    /* Synthesis */
    .synthesis-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
    }
    .synthesis-loading {
      color: var(--muted);
      font-style: italic;
    }

    /* Chat */
    .chat-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
    }
    .chat-messages {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 320px;
      overflow-y: auto;
    }
    .chat-msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.55;
      max-width: 90%;
    }
    .chat-msg.user {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
    }
    .chat-msg.assistant {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      align-self: flex-start;
    }
    .chat-msg.thinking {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      font-style: italic;
      align-self: flex-start;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .chat-input-row input {
      flex: 1;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .chat-input-row input:focus { border-color: var(--accent); }
    .chat-input-row input::placeholder { color: var(--muted); }
    .btn-send {
      padding: 9px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-send:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .hidden { display: none !important; }

    /* Empty state */
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 20px;
      font-size: 13px;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="logo">Text<span>pot</span></div>
        <div class="tagline">Search the world, not just your corner of it.</div>
      </div>
    </header>

    <main id="main">
      <!-- Search -->
      <div>
        <div class="search-row">
          <input
            id="queryInput"
            type="text"
            placeholder="Search across global platforms…"
            autocomplete="off"
          />
          <button class="btn-search" id="searchBtn">Search</button>
        </div>
      </div>

      <!-- Source toggles -->
      <div>
        <div class="section-label">Sources</div>
        <div class="source-pills" id="sourcePills"></div>
      </div>

      <!-- Results -->
      <div id="resultsSection" class="hidden">
        <div class="section-label">Results</div>
        <div class="results-grid" id="resultsGrid"></div>
      </div>

      <!-- Empty state shown before any search -->
      <div id="emptyState" class="empty-state">
        <div class="icon">🌏</div>
        Select sources above and enter a query to begin.
      </div>

      <!-- Synthesis -->
      <div id="synthesisSection" class="hidden">
        <div class="section-label">Synthesis</div>
        <div class="synthesis-box" id="synthesisContent"></div>
      </div>

      <!-- Chat -->
      <div id="chatSection" class="hidden">
        <div class="section-label">Follow-up Chat</div>
        <div class="chat-panel">
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-row">
            <input
              id="chatInput"
              type="text"
              placeholder="Ask a follow-up question…"
              autocomplete="off"
            />
            <button class="btn-send" id="chatSendBtn">Send</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
