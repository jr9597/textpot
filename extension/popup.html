<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Textpot</title>
  <link rel="icon" href="icons/textpot.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #0f0f0f;
      width: 220px;
      padding: 18px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 3px;
    }

    .tagline {
      font-size: 11px;
      color: #b0b0b0;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      padding: 9px 12px;
      background: #0f0f0f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    button:hover { background: #333; }
  </style>
</head>
<body>
  <div class="logo">Textpot</div>
  <div class="tagline">Social media sentiment intelligence.</div>
  <button id="openBtn">Open Textpot</button>
  <script src="popup.js"></script>
</body>
</html>
